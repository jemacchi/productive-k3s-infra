name: PR Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-and-contract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    env:
      TELEMETRY_ENABLED: "false"
    steps:
      - name: Checkout productive-k3s-infra
        uses: actions/checkout@v4
        with:
          path: productive-k3s-infra
          fetch-depth: 0

      - name: Checkout productive-k3s-core
        uses: actions/checkout@v4
        with:
          repository: jemacchi/productive-k3s-core
          ref: main
          path: productive-k3s-core
          fetch-depth: 0

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install Multipass
        shell: bash
        run: |
          set -euo pipefail
          sudo snap install multipass
          mkdir -p "${RUNNER_TEMP}/ci-bin"
          cat > "${RUNNER_TEMP}/ci-bin/multipass" <<'EOF'
          #!/usr/bin/env bash
          exec sudo /snap/bin/multipass "$@"
          EOF
          chmod +x "${RUNNER_TEMP}/ci-bin/multipass"
          echo "${RUNNER_TEMP}/ci-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/ci-bin/multipass" version

      - name: Run static checks
        working-directory: productive-k3s-infra
        shell: bash
        run: |
          set -euo pipefail
          TOFU_BIN="$(command -v tofu)" make test-static

      - name: Run contract checks
        working-directory: productive-k3s-infra
        run: make test-contract

      - name: Run telemetry regressions
        working-directory: productive-k3s-infra
        run: make test-telemetry

      - name: Upload matrix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-artifacts
          path: |
            productive-k3s-infra/test-artifacts
            productive-k3s-infra/scenarios/*/generated
          if-no-files-found: ignore

  aws-localstack-contract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    needs:
      - static-and-contract
    runs-on: ubuntu-24.04
    env:
      TELEMETRY_ENABLED: "false"
      LOCALSTACK_ENDPOINT: "http://localhost:4566"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    steps:
      - name: Checkout productive-k3s-infra
        uses: actions/checkout@v4
        with:
          path: productive-k3s-infra
          fetch-depth: 0

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Start LocalStack
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name localstack-ci \
            -p 4566:4566 \
            -e SERVICES=ec2,sts,iam \
            -e EC2_VM_MANAGER=mock \
            localstack/localstack:2.3.2

      - name: Wait for LocalStack health
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -fsS "${LOCALSTACK_ENDPOINT}/_localstack/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become healthy in time" >&2
          exit 1

      - name: Run aws-single-node LocalStack contract test
        working-directory: productive-k3s-infra
        shell: bash
        run: |
          set -euo pipefail
          TOFU_BIN="$(command -v tofu)" make test-aws-localstack-contract

      - name: Dump LocalStack logs
        if: always()
        shell: bash
        run: docker logs localstack-ci || true

  live-onprem-github-host:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    needs:
      - static-and-contract
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TELEMETRY_ENABLED: "false"
    steps:
      - name: Checkout productive-k3s-infra
        uses: actions/checkout@v4
        with:
          path: productive-k3s-infra
          fetch-depth: 0

      - name: Checkout productive-k3s-core
        uses: actions/checkout@v4
        with:
          repository: jemacchi/productive-k3s-core
          ref: main
          path: productive-k3s-core
          fetch-depth: 0

      - name: Install Multipass
        shell: bash
        run: |
          set -euo pipefail
          sudo snap install multipass
          mkdir -p "${RUNNER_TEMP}/ci-bin"
          cat > "${RUNNER_TEMP}/ci-bin/multipass" <<'EOF'
          #!/usr/bin/env bash
          exec sudo /snap/bin/multipass "$@"
          EOF
          chmod +x "${RUNNER_TEMP}/ci-bin/multipass"
          echo "${RUNNER_TEMP}/ci-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/ci-bin/multipass" version

      - name: Run GitHub-host on-prem live test
        working-directory: productive-k3s-infra
        shell: bash
        run: |
          set -euo pipefail
          TOFU_BIN="$(command -v tofu)" make test-live-gha-onprem

      - name: Upload live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-live-onprem-github-host-artifacts
          path: |
            productive-k3s-infra/test-artifacts
            productive-k3s-infra/scenarios/onprem-basic/generated
          if-no-files-found: ignore
